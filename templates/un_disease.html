<!DOCTYPE html>
<html>
<head>
	<title>My Simple Website</title>
	<style>
		body {
			font-size: 48px;
			text-align: center;
		}
        .emoji{
            font-size: 160px;
        }
		.btn {
        margin-top: 30px;
        display: inline-block;
        padding: 22px 44px;
        border-radius: 6px;
        font-size: 16px;
        text-align: center;
        text-decoration: none;
        background: linear-gradient(to right, #9CECFB, #65C7F7, #0052D4);
        color: #0b0b0b;
        transition: background-color 0.3s ease;
        margin-right: 10px;
      }
      .btn:last-of-type {
        margin-right: 0;
      }
      .btn:hover {
        background: linear-gradient(to bottom right, #87CEFA, #00BFFF);
      }
      .btn-group {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        margin: 0 auto;
        max-width: 800px;
      }
      @media screen and (max-width: 480px) {
        .btn {
          display: block;
          width: 100%;
          margin: 0 0 10px 0;
        }
        .btn:last-of-type {
          margin-bottom: 0;
        }
      }
	</style>
</head>
<body>
	<h1>Smart Siriculture</h1>
	<p class="emoji">&#x1F60A;</p>
	<p>The silkworm is healthy</p>
	

	<div class="btn-group">
    
    <a href="{{url_for('Main')}}" class="btn">EXIT</a>
  </div>
</body>
</html>
